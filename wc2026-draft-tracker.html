<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚽ WC 2026 Draft Tracker</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: #0d0d1a;
    color: #fff;
    min-height: 100vh;
  }

  /* ── PITCH TEXTURE HEADER ── */
  .hero {
    background: linear-gradient(170deg, #0a3d1f 0%, #0f5c2e 50%, #0a3d1f 100%);
    position: relative;
    overflow: hidden;
    padding: 28px 20px 20px;
    text-align: center;
  }
  .hero::before {
    content: '';
    position: absolute; inset: 0;
    background-image:
      repeating-linear-gradient(0deg, rgba(255,255,255,0.03) 0px, rgba(255,255,255,0.03) 1px, transparent 1px, transparent 40px),
      repeating-linear-gradient(90deg, rgba(255,255,255,0.03) 0px, rgba(255,255,255,0.03) 1px, transparent 1px, transparent 60px);
    pointer-events: none;
  }
  .hero-title {
    font-size: 26px;
    font-weight: 900;
    letter-spacing: -1px;
    position: relative;
  }
  .hero-title span { color: #ffd700; }
  .hero-sub {
    font-size: 13px;
    color: rgba(255,255,255,0.55);
    margin-top: 4px;
    position: relative;
  }

  /* ── TABS ── */
  .tabs {
    display: flex;
    gap: 8px;
    justify-content: center;
    padding: 14px 16px;
    background: rgba(255,255,255,0.04);
    border-bottom: 1px solid rgba(255,255,255,0.08);
    position: sticky;
    top: 0;
    z-index: 50;
    backdrop-filter: blur(12px);
  }
  .tab {
    padding: 7px 16px;
    border-radius: 20px;
    border: none;
    font-weight: 700;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
    background: rgba(255,255,255,0.1);
    color: rgba(255,255,255,0.7);
  }
  .tab.active {
    background: #ffd700;
    color: #111;
  }
  .tab:hover:not(.active) {
    background: rgba(255,255,255,0.18);
    color: #fff;
  }

  /* ── MAIN CONTENT ── */
  .content {
    max-width: 600px;
    margin: 0 auto;
    padding: 16px;
  }

  /* ── REFRESH BAR ── */
  .refresh-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: rgba(255,255,255,0.06);
    border-radius: 10px;
    padding: 9px 14px;
    margin-bottom: 16px;
    font-size: 12px;
    color: rgba(255,255,255,0.5);
  }
  .refresh-btn {
    padding: 5px 14px;
    border-radius: 20px;
    background: #4fc3f7;
    border: none;
    color: #000;
    font-weight: 700;
    font-size: 12px;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .refresh-btn:disabled { opacity: 0.4; cursor: default; }
  .refresh-btn:hover:not(:disabled) { opacity: 0.85; }

  /* ── ERROR BANNER ── */
  .error-banner {
    background: rgba(255,80,80,0.12);
    border: 1px solid rgba(255,80,80,0.25);
    border-radius: 8px;
    padding: 9px 14px;
    margin-bottom: 14px;
    font-size: 13px;
    color: #ff9999;
    display: none;
  }

  /* ── LEADERBOARD ── */
  .lb-card {
    background: rgba(255,255,255,0.06);
    border-radius: 14px;
    padding: 14px 16px;
    margin-bottom: 12px;
    border: 1px solid rgba(255,255,255,0.08);
    transition: transform 0.15s;
  }
  .lb-card:hover { transform: translateY(-1px); }
  .lb-card.first { border-color: #ffd700; }
  .lb-row { display: flex; justify-content: space-between; align-items: center; }
  .lb-avatar {
    width: 36px; height: 36px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; flex-shrink: 0;
  }
  .lb-name { font-weight: 800; font-size: 16px; }
  .lb-sub { font-size: 12px; color: rgba(255,255,255,0.45); margin-top: 2px; }
  .lb-pts { font-size: 34px; font-weight: 900; }
  .progress-track {
    margin-top: 10px;
    background: rgba(255,255,255,0.1);
    border-radius: 4px; height: 6px;
  }
  .progress-fill {
    height: 100%; border-radius: 4px;
    transition: width 1s ease;
  }

  /* ── TEAM DETAIL CARDS ── */
  .team-card {
    background: #fff;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 4px 24px rgba(0,0,0,0.3);
    margin-bottom: 20px;
  }
  .team-header {
    padding: 16px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .team-header-name { color: #fff; font-weight: 800; font-size: 19px; }
  .team-header-sub { font-size: 12px; margin-top: 3px; }
  .team-header-pts { font-size: 36px; font-weight: 900; line-height: 1; }
  .team-header-pts-label { font-size: 11px; opacity: 0.6; color: #fff; }
  .team-body { padding: 10px 14px 14px; }
  .country-row {
    display: flex;
    align-items: center;
    gap: 9px;
    padding: 8px 10px;
    border-radius: 10px;
    margin-bottom: 5px;
    border: 2px solid transparent;
  }
  .country-flag { font-size: 20px; flex-shrink: 0; }
  .country-name { font-weight: 700; font-size: 14px; color: #222; flex: 1; }
  .country-sub { font-size: 11px; color: #888; }
  .pts-badge {
    border-radius: 20px;
    padding: 3px 10px;
    font-weight: 800;
    font-size: 15px;
    color: #fff;
    flex-shrink: 0;
  }
  .status-icon { font-size: 17px; flex-shrink: 0; }

  /* ── GROUPS VIEW ── */
  .group-block {
    background: rgba(255,255,255,0.06);
    border-radius: 13px;
    overflow: hidden;
    margin-bottom: 14px;
    border: 1px solid rgba(255,255,255,0.08);
  }
  .group-header {
    background: rgba(255,255,255,0.1);
    padding: 8px 14px;
    font-weight: 800;
    font-size: 14px;
    letter-spacing: 1px;
  }
  .group-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 14px;
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }
  .group-row:last-child { border-bottom: none; }
  .owner-tag {
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 10px;
    font-weight: 700;
    white-space: nowrap;
  }
  .group-stats {
    display: flex;
    gap: 10px;
    font-size: 12px;
    color: rgba(255,255,255,0.6);
    margin-left: auto;
    align-items: center;
  }

  /* ── PANEL VISIBILITY ── */
  .panel { display: none; }
  .panel.active { display: block; }

  /* ── LOADER ── */
  .spinner {
    display: inline-block;
    width: 14px; height: 14px;
    border: 2px solid rgba(255,255,255,0.2);
    border-top-color: #4fc3f7;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin-right: 6px;
    vertical-align: middle;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .footer {
    text-align: center;
    color: rgba(255,255,255,0.2);
    font-size: 11px;
    padding: 20px 0 32px;
  }
</style>
</head>
<body>

<div class="hero">
  <div class="hero-title">⚽ WC 2026 <span>Draft Tracker</span></div>
  <div class="hero-sub">Curtis · Brown · Hits · Taylor</div>
</div>

<div class="tabs">
  <button class="tab active" onclick="switchTab('leaderboard', this)">🏆 Standings</button>
  <button class="tab" onclick="switchTab('teams', this)">👥 By Team</button>
  <button class="tab" onclick="switchTab('groups', this)">📊 WC Groups</button>
</div>

<div class="content">
  <div class="refresh-bar">
    <span id="status-text">Click Refresh to load live standings</span>
    <button class="refresh-btn" id="refresh-btn" onclick="loadStandings()">↻ Refresh</button>
  </div>
  <div class="error-banner" id="error-banner"></div>

  <!-- LEADERBOARD -->
  <div class="panel active" id="panel-leaderboard">
    <div style="font-size:17px;font-weight:800;margin-bottom:14px;">🏆 Draft Standings</div>
    <div id="lb-content"><div style="color:rgba(255,255,255,0.3);text-align:center;padding:40px 0;font-size:14px;">Hit Refresh to load live data ↑</div></div>
  </div>

  <!-- TEAMS -->
  <div class="panel" id="panel-teams">
    <div id="teams-content"><div style="color:rgba(255,255,255,0.3);text-align:center;padding:40px 0;font-size:14px;">Hit Refresh to load live data ↑</div></div>
  </div>

  <!-- GROUPS -->
  <div class="panel" id="panel-groups">
    <div style="font-size:13px;color:rgba(255,255,255,0.5);margin-bottom:14px;">All 12 FIFA groups · color-coded by draft owner</div>
    <div id="groups-content"></div>
  </div>

  <div class="footer">Data via Claude AI · <a href="https://claude.ai" style="color:rgba(255,255,255,0.3)">claude.ai</a> · Standings update on refresh</div>
</div>

<script>
// ── DATA ──────────────────────────────────────────────────────────────
const DRAFT_TEAMS = {
  "Team 1 - Curtis": ["Spain","Netherlands","Morocco","Ecuador","Uruguay","Austria","Canada","Czechia","Iran","New Zealand","Saudi Arabia","Curaçao"],
  "Team 2 - Brown":  ["France","Germany","Norway","Japan","Turkey","Mexico","Scotland","Egypt","Australia","Uzbekistan","South Africa","Qatar"],
  "Team 3 - Hits":   ["Argentina","Portugal","Belgium","Croatia","Ivory Coast","USA","South Korea","Algeria","Bosnia","Tunisia","Iraq","Cape Verde"],
  "Team 4 - Taylor": ["England","Brazil","Colombia","Senegal","Switzerland","Sweden","Paraguay","Ghana","Congo","Panama","Jordan","Haiti"]
};

const COLORS = {
  "Team 1 - Curtis": { bg:"#1a3a5c", accent:"#4fc3f7", light:"#e3f2fd", grad:"linear-gradient(135deg,#1a3a5c,#0d6b8e)", emoji:"🦅" },
  "Team 2 - Brown":  { bg:"#2d4a1e", accent:"#81c784", light:"#e8f5e9", grad:"linear-gradient(135deg,#2d4a1e,#3d7228)", emoji:"🦁" },
  "Team 3 - Hits":   { bg:"#4a1942", accent:"#ce93d8", light:"#f3e5f5", grad:"linear-gradient(135deg,#4a1942,#7b2f7e)", emoji:"⚡" },
  "Team 4 - Taylor": { bg:"#4a2800", accent:"#ffb74d", light:"#fff3e0", grad:"linear-gradient(135deg,#4a2800,#8d5100)", emoji:"🔥" }
};

const FLAGS = {
  "Spain":"🇪🇸","Netherlands":"🇳🇱","Morocco":"🇲🇦","Ecuador":"🇪🇨","Uruguay":"🇺🇾","Austria":"🇦🇹",
  "Canada":"🇨🇦","Czechia":"🇨🇿","Iran":"🇮🇷","New Zealand":"🇳🇿","Saudi Arabia":"🇸🇦","Curaçao":"🇨🇼",
  "France":"🇫🇷","Germany":"🇩🇪","Norway":"🇳🇴","Japan":"🇯🇵","Turkey":"🇹🇷","Mexico":"🇲🇽",
  "Scotland":"🏴󠁧󠁢󠁳󠁣󠁴󠁿","Egypt":"🇪🇬","Australia":"🇦🇺","Uzbekistan":"🇺🇿","South Africa":"🇿🇦","Qatar":"🇶🇦",
  "Argentina":"🇦🇷","Portugal":"🇵🇹","Belgium":"🇧🇪","Croatia":"🇭🇷","Ivory Coast":"🇨🇮","USA":"🇺🇸",
  "South Korea":"🇰🇷","Algeria":"🇩🇿","Bosnia":"🇧🇦","Tunisia":"🇹🇳","Iraq":"🇮🇶","Cape Verde":"🇨🇻",
  "England":"🏴󠁧󠁢󠁥󠁮󠁧󠁿","Brazil":"🇧🇷","Colombia":"🇨🇴","Senegal":"🇸🇳","Switzerland":"🇨🇭","Sweden":"🇸🇪",
  "Paraguay":"🇵🇾","Ghana":"🇬🇭","Congo":"🇨🇬","Panama":"🇵🇦","Jordan":"🇯🇴","Haiti":"🇭🇹"
};

const WC_GROUPS = {
  A:["Mexico","South Africa","South Korea","Czechia"],
  B:["Canada","Bosnia","Qatar","Switzerland"],
  C:["Brazil","Morocco","Haiti","Scotland"],
  D:["USA","Paraguay","Australia","Turkey"],
  E:["Germany","Ecuador","Ivory Coast","Curaçao"],
  F:["Netherlands","Japan","Sweden","Tunisia"],
  G:["Belgium","Egypt","Iran","New Zealand"],
  H:["Spain","Uruguay","Cape Verde","Saudi Arabia"],
  I:["France","Senegal","Norway","Iraq"],
  J:["Argentina","Algeria","Austria","Jordan"],
  K:["Colombia","Portugal","Congo","Uzbekistan"],
  L:["England","Croatia","Ghana","Panama"]
};

function getOwner(country) {
  for (const [team, list] of Object.entries(DRAFT_TEAMS)) {
    if (list.some(c => c.toLowerCase() === country.toLowerCase())) return team;
  }
  return null;
}

let standingsData = [];

// ── TABS ─────────────────────────────────────────────────────────────
function switchTab(name, btn) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('panel-' + name).classList.add('active');
  btn.classList.add('active');
}

// ── RENDER HELPERS ────────────────────────────────────────────────────
function statusIcon(s) {
  if (s === 'advanced') return '✅';
  if (s === 'eliminated') return '❌';
  if (s === 'bubble') return '🫧';
  return '⏳';
}

function renderLeaderboard() {
  const lb = Object.keys(DRAFT_TEAMS).map(name => {
    const list = DRAFT_TEAMS[name];
    const mine = standingsData.filter(s => list.some(c => c.toLowerCase() === s.team.toLowerCase()));
    const total = mine.reduce((a,b) => a + (b.pts||0), 0);
    const advanced = mine.filter(s => s.status === 'advanced').length;
    const alive = mine.filter(s => s.status !== 'eliminated').length;
    return { name, total, advanced, alive };
  }).sort((a,b) => b.total - a.total || b.advanced - a.advanced);

  const maxPts = Math.max(...lb.map(l => l.total), 1);
  const medals = ['🥇','🥈','🥉','#4'];

  const html = lb.map((item, i) => {
    const c = COLORS[item.name];
    const pct = Math.round((item.total / maxPts) * 100);
    return `
    <div class="lb-card ${i===0?'first':''}">
      <div class="lb-row">
        <div style="display:flex;align-items:center;gap:11px;">
          <div class="lb-avatar" style="background:${c.bg}">${c.emoji}</div>
          <div>
            <div class="lb-name">${medals[i]||'#'+(i+1)} ${item.name}</div>
            <div class="lb-sub">${item.alive} teams alive &middot; ${item.advanced} advanced</div>
          </div>
        </div>
        <div class="lb-pts" style="color:${c.accent}">${item.total}</div>
      </div>
      <div class="progress-track">
        <div class="progress-fill" style="width:${pct}%;background:${c.grad}"></div>
      </div>
    </div>`;
  }).join('');

  document.getElementById('lb-content').innerHTML = html;
}

function renderTeams() {
  const lb = Object.keys(DRAFT_TEAMS).map(name => {
    const mine = standingsData.filter(s => DRAFT_TEAMS[name].some(c => c.toLowerCase() === s.team.toLowerCase()));
    return { name, total: mine.reduce((a,b) => a+(b.pts||0),0) };
  }).sort((a,b) => b.total - a.total);

  const html = lb.map(({ name }) => {
    const c = COLORS[name];
    const list = DRAFT_TEAMS[name];
    const mine = standingsData
      .filter(s => list.some(c2 => c2.toLowerCase() === s.team.toLowerCase()))
      .sort((a,b) => b.pts - a.pts);
    const total = mine.reduce((a,b) => a+(b.pts||0),0);
    const advanced = mine.filter(s => s.status==='advanced').length;
    const active   = mine.filter(s => s.status==='active'||s.status==='bubble').length;
    const elim     = mine.filter(s => s.status==='eliminated').length;

    const rows = mine.map(s => `
      <div class="country-row" style="background:${c.light};border-color:${c.accent}">
        <span class="country-flag">${FLAGS[s.team]||'🏳'}</span>
        <div style="flex:1">
          <div class="country-name">${s.team}</div>
          <div class="country-sub">Grp ${s.group} &middot; ${s.played}GP &middot; ${s.gd>0?'+':''}${s.gd} GD</div>
        </div>
        <div class="pts-badge" style="background:${c.bg}">${s.pts}</div>
        <span class="status-icon">${statusIcon(s.status)}</span>
      </div>`).join('');

    return `
    <div class="team-card">
      <div class="team-header" style="background:${c.grad}">
        <div>
          <div style="font-size:20px;margin-bottom:3px">${c.emoji}</div>
          <div class="team-header-name">${name}</div>
          <div class="team-header-sub" style="color:${c.accent}">
            ${advanced>0?`✅ ${advanced} advanced &nbsp;`:''}${active>0?`⏳ ${active} playing &nbsp;`:''}${elim>0?`❌ ${elim} out`:''}
          </div>
        </div>
        <div style="text-align:right">
          <div class="team-header-pts" style="color:${c.accent}">${total}</div>
          <div class="team-header-pts-label">total pts</div>
        </div>
      </div>
      <div class="team-body">${rows}</div>
    </div>`;
  }).join('');

  document.getElementById('teams-content').innerHTML = html;
}

function renderGroups() {
  const html = Object.entries(WC_GROUPS).map(([grp, teams]) => {
    const rows = teams.map(team => {
      const owner = getOwner(team);
      const c = owner ? COLORS[owner] : null;
      const s = standingsData.find(x => x.team.toLowerCase() === team.toLowerCase());
      const ownerTag = owner
        ? `<span class="owner-tag" style="background:${c.bg};color:${c.accent}">${owner.split(' - ')[1]}</span>`
        : '';
      const stats = s
        ? `<div class="group-stats">
             <span>${s.played}GP</span>
             <span style="font-weight:800;color:${c?c.accent:'#fff'}">${s.pts}pts</span>
             <span style="font-size:15px">${statusIcon(s.status)}</span>
           </div>`
        : '<div class="group-stats"><span style="opacity:0.3">—</span></div>';
      const rowBg = c ? `${c.bg}44` : 'transparent';
      return `
        <div class="group-row" style="background:${rowBg}">
          <span style="font-size:20px">${FLAGS[team]||'🏳'}</span>
          <span style="font-weight:700;font-size:14px">${team}</span>
          ${ownerTag}
          ${stats}
        </div>`;
    }).join('');

    return `
    <div class="group-block">
      <div class="group-header">GROUP ${grp}</div>
      ${rows}
    </div>`;
  }).join('');

  document.getElementById('groups-content').innerHTML = html;
}

// ── LOAD STANDINGS ────────────────────────────────────────────────────
async function loadStandings() {
  const btn = document.getElementById('refresh-btn');
  const statusEl = document.getElementById('status-text');
  const errorEl = document.getElementById('error-banner');

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Loading…';
  statusEl.innerHTML = '<span class="spinner"></span>Fetching live standings…';
  errorEl.style.display = 'none';

  const prompt = `You are a 2026 FIFA World Cup data assistant. Today is June 9, 2026. The World Cup started June 11, 2026.

Return ONLY a JSON array (no markdown, no explanation, no backticks) with standings for ALL 48 World Cup teams. Exact format:

[{"team":"Mexico","group":"A","played":1,"won":1,"drawn":0,"lost":0,"gf":2,"ga":0,"gd":2,"pts":3,"status":"active"}]

Status must be one of: "active" (still in group stage), "advanced" (qualified for round of 32), "eliminated" (out), "bubble" (3rd place, may still qualify as best 3rd-placed team).

Use EXACTLY these team names: Spain, Netherlands, Morocco, Ecuador, Uruguay, Austria, Canada, Czechia, Iran, New Zealand, Saudi Arabia, Curaçao, France, Germany, Norway, Japan, Turkey, Mexico, Scotland, Egypt, Australia, Uzbekistan, South Africa, Qatar, Argentina, Portugal, Belgium, Croatia, Ivory Coast, USA, South Korea, Algeria, Bosnia, Tunisia, Iraq, Cape Verde, England, Brazil, Colombia, Senegal, Switzerland, Sweden, Paraguay, Ghana, Congo, Panama, Jordan, Haiti.

Use the most current known results as of today. Return ONLY the raw JSON array, no other text.`;

  try {
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        tools: [{ type: "web_search_20250305", name: "web_search" }],
        messages: [{ role: "user", content: prompt }]
      })
    });

    if (!response.ok) throw new Error(`API ${response.status}`);
    const data = await response.json();

    let text = (data.content || [])
      .filter(b => b.type === 'text')
      .map(b => b.text).join('');

    const match = text.match(/\[[\s\S]*\]/);
    if (!match) throw new Error("No JSON array in response");

    standingsData = JSON.parse(match[0]);
    const now = new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
    statusEl.textContent = `✓ Updated at ${now}`;

  } catch (err) {
    // Fallback: all zeroes so UI renders
    standingsData = Object.entries(WC_GROUPS).flatMap(([grp, teams]) =>
      teams.map(t => ({ team:t, group:grp, played:0, won:0, drawn:0, lost:0, gf:0, ga:0, gd:0, pts:0, status:'active' }))
    );
    errorEl.textContent = '⚠ Could not reach live data — showing zeroed standings. Check your API key or network.';
    errorEl.style.display = 'block';
    statusEl.textContent = 'Load failed — showing placeholder data';
  }

  renderLeaderboard();
  renderTeams();
  renderGroups();

  btn.disabled = false;
  btn.textContent = '↻ Refresh';
}

// ── INIT ──────────────────────────────────────────────────────────────
renderGroups(); // render group structure immediately (no data needed for layout)
</script>
</body>
</html>
