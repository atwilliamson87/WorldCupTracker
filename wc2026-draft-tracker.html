<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚽ Old Men Yelling at Offside Calls · WC26</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --black:   #020F2A;
    --white:   #F5F5F0;
    --gold:    #C9A84C;
    --gold-lt: #E8C96A;
    --red:     #C8102E;   /* Canada */
    --green:   #006847;   /* Mexico */
    --blue:    #002868;   /* USA */
    --mid:     #1a1a2e;
    --card:    #0d1b35;
    --border:  rgba(255,255,255,0.08);
  }

  body {
    font-family: 'Noto Sans', system-ui, sans-serif;
    background: var(--black);
    color: var(--white);
    min-height: 100vh;
  }

  /* ── HERO ── */
  .hero {
    background: var(--black);
    border-bottom: 3px solid var(--gold);
    padding: 24px 20px 18px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  /* Subtle pitch lines */
  .hero::before {
    content: '';
    position: absolute; inset: 0;
    background-image:
      repeating-linear-gradient(90deg, rgba(201,168,76,0.04) 0px, rgba(201,168,76,0.04) 1px, transparent 1px, transparent 80px);
    pointer-events: none;
  }
  .hero-eyebrow {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 8px;
    position: relative;
  }
  .hero-title {
    font-size: 22px;
    font-weight: 900;
    letter-spacing: -0.5px;
    color: var(--white);
    position: relative;
    line-height: 1.2;
  }
  .hero-badge {
    display: inline-block;
    background: var(--gold);
    color: var(--black);
    font-size: 10px;
    font-weight: 900;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 3px 10px;
    border-radius: 2px;
    margin-top: 8px;
    position: relative;
  }
  .hero-sub {
    font-size: 12px;
    color: rgba(255,255,255,0.4);
    margin-top: 8px;
    position: relative;
    letter-spacing: 1px;
  }
  /* Three host nation color bar */
  .host-bar {
    display: flex;
    height: 3px;
    margin-top: 16px;
    position: relative;
  }
  .host-bar div { flex: 1; }

  /* ── TABS ── */
  .tabs {
    display: flex;
    gap: 0;
    background: var(--black);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 50;
  }
  .tab {
    flex: 1;
    padding: 13px 8px;
    border: none;
    background: transparent;
    color: rgba(255,255,255,0.4);
    font-family: 'Noto Sans', sans-serif;
    font-weight: 700;
    font-size: 12px;
    letter-spacing: 0.5px;
    cursor: pointer;
    transition: all 0.2s;
    border-bottom: 3px solid transparent;
    text-transform: uppercase;
  }
  .tab.active {
    color: var(--gold);
    border-bottom-color: var(--gold);
  }
  .tab:hover:not(.active) { color: var(--white); }

  /* ── CONTENT ── */
  .content { max-width: 640px; margin: 0 auto; padding: 16px; }

  /* ── STATUS BAR ── */
  .status-bar {
    display: flex; align-items: center; justify-content: space-between;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 14px;
    margin-bottom: 16px;
    font-size: 11px;
    color: rgba(255,255,255,0.4);
    letter-spacing: 0.5px;
  }
  .refresh-btn {
    padding: 5px 14px;
    border-radius: 3px;
    background: var(--gold);
    border: none;
    color: var(--black);
    font-family: 'Noto Sans', sans-serif;
    font-weight: 900;
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .refresh-btn:disabled { opacity: 0.35; cursor: default; }
  .refresh-btn:hover:not(:disabled) { opacity: 0.85; }

  .banner { border-radius: 4px; padding: 8px 12px; margin-bottom: 12px; font-size: 12px; display: none; }
  .banner.info  { background: rgba(201,168,76,0.1); border: 1px solid rgba(201,168,76,0.3); color: var(--gold-lt); }
  .banner.error { background: rgba(200,16,46,0.1);  border: 1px solid rgba(200,16,46,0.3);  color: #ff8899; }

  /* ── SECTION HEADING ── */
  .section-title {
    font-size: 10px;
    font-weight: 900;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* ── LEADERBOARD ── */
  .lb-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 14px 16px;
    margin-bottom: 8px;
    transition: border-color 0.2s;
    position: relative;
    overflow: hidden;
  }
  .lb-card.first { border-color: var(--gold); }
  .lb-card.first::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--gold), var(--gold-lt), var(--gold));
  }
  .lb-row { display: flex; justify-content: space-between; align-items: center; }
  .lb-rank {
    width: 28px; height: 28px; border-radius: 3px;
    display: flex; align-items: center; justify-content: center;
    font-weight: 900; font-size: 13px; flex-shrink: 0;
  }
  .lb-name { font-weight: 800; font-size: 15px; }
  .lb-sub { font-size: 11px; color: rgba(255,255,255,0.35); margin-top: 2px; letter-spacing: 0.3px; }
  .lb-pts { font-size: 32px; font-weight: 900; line-height: 1; }
  .lb-pts-label { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: rgba(255,255,255,0.35); text-align: right; margin-top: 1px; }
  .progress-track { margin-top: 10px; background: rgba(255,255,255,0.07); border-radius: 2px; height: 3px; }
  .progress-fill { height: 100%; border-radius: 2px; transition: width 1.2s ease; }

  /* ── TEAM CARDS ── */
  .team-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
    margin-bottom: 16px;
  }
  .team-header {
    padding: 14px 18px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .team-header-label {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    opacity: 0.6;
    margin-bottom: 4px;
  }
  .team-header-name { font-weight: 900; font-size: 18px; }
  .team-header-sub { font-size: 11px; opacity: 0.5; margin-top: 3px; }
  .team-header-pts { font-size: 38px; font-weight: 900; line-height: 1; }
  .team-body { padding: 10px 14px 14px; }
  .country-row {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 10px; border-radius: 4px; margin-bottom: 4px;
    border-left: 3px solid transparent;
    background: rgba(255,255,255,0.03);
    transition: background 0.15s;
  }
  .country-row:hover { background: rgba(255,255,255,0.06); }
  .country-name { font-weight: 700; font-size: 14px; flex: 1; }
  .country-sub { font-size: 10px; color: rgba(255,255,255,0.35); letter-spacing: 0.3px; }
  .pts-badge {
    border-radius: 3px;
    padding: 3px 9px;
    font-weight: 900;
    font-size: 14px;
    flex-shrink: 0;
    min-width: 36px;
    text-align: center;
  }

  /* ── GROUPS ── */
  .group-block {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
    margin-bottom: 10px;
  }
  .group-header {
    background: rgba(255,255,255,0.05);
    padding: 7px 14px;
    font-weight: 900;
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--gold);
    border-bottom: 1px solid var(--border);
  }
  .group-row {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 14px;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    transition: background 0.15s;
  }
  .group-row:last-child { border-bottom: none; }
  .group-row:hover { background: rgba(255,255,255,0.03); }
  .owner-tag {
    font-size: 9px; padding: 2px 6px; border-radius: 2px;
    font-weight: 700; white-space: nowrap;
    letter-spacing: 0.5px; text-transform: uppercase;
  }
  .group-stats { display: flex; gap: 10px; font-size: 11px; color: rgba(255,255,255,0.45); margin-left: auto; align-items: center; }

  /* ── PANELS ── */
  .panel { display: none; }
  .panel.active { display: block; }

  /* ── SPINNER ── */
  .spinner {
    display: inline-block; width: 12px; height: 12px;
    border: 2px solid rgba(255,255,255,0.15);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin-right: 5px; vertical-align: middle;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .empty { color: rgba(255,255,255,0.25); text-align: center; padding: 40px 0; font-size: 13px; }
  .footer { text-align: center; color: rgba(255,255,255,0.15); font-size: 10px; padding: 24px 0 36px; letter-spacing: 1px; text-transform: uppercase; }
</style>
</head>
<body>

<!-- HERO -->
<div class="hero">
  <div class="hero-eyebrow">FIFA World Cup 2026</div>
  <div class="hero-title">Old Men Yelling at Offside Calls</div>
  <div class="hero-badge">WC26 · Group Stage Tracker</div>
  <div class="hero-sub">Curtis &nbsp;·&nbsp; Brown &nbsp;·&nbsp; Hits &nbsp;·&nbsp; Taylor</div>
  <div class="host-bar">
    <div style="background:#C8102E"></div><!-- Canada red -->
    <div style="background:#F5F5F0"></div><!-- white -->
    <div style="background:#006847"></div><!-- Mexico green -->
    <div style="background:#F5F5F0"></div><!-- white -->
    <div style="background:#002868"></div><!-- USA blue -->
  </div>
</div>

<!-- TABS -->
<div class="tabs">
  <button class="tab active" onclick="switchTab('leaderboard',this)">🏆 Standings</button>
  <button class="tab" onclick="switchTab('teams',this)">👥 By Team</button>
  <button class="tab" onclick="switchTab('groups',this)">📊 WC Groups</button>
</div>

<div class="content">
  <div class="status-bar">
    <span id="status-text">Loading…</span>
    <button class="refresh-btn" id="refresh-btn" onclick="loadData()">↻ Refresh</button>
  </div>
  <div class="banner info"  id="info-banner"></div>
  <div class="banner error" id="error-banner"></div>

  <!-- LEADERBOARD -->
  <div class="panel active" id="panel-leaderboard">
    <div class="section-title">Group Stage Standings</div>
    <div id="lb-content"><div class="empty">Loading scores…</div></div>
  </div>

  <!-- TEAMS -->
  <div class="panel" id="panel-teams">
    <div id="teams-content"><div class="empty">Loading scores…</div></div>
  </div>

  <!-- GROUPS -->
  <div class="panel" id="panel-groups">
    <div class="section-title">All 12 FIFA Groups</div>
    <div id="groups-content"></div>
  </div>

  <div class="footer">Scores via Google Sheets · Updated hourly · WC26</div>
</div>

<script>
// ── CONFIG ────────────────────────────────────────────────────────────
const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT8PP4yES1CG6IzO26GlMPWfNLWg6-uZp-KEUrF5PKH8SZFc8-Uv3cctLRIHYNaBJRJJjsIvNWS6EVK/pub?gid=1689908772&single=true&output=csv';

// ── TEAM ASSIGNMENTS ─────────────────────────────────────────────────
const DRAFT_TEAMS = {
  "Team 1 - Curtis": ["Spain","Netherlands","Morocco","Ecuador","Uruguay","Austria","Canada","Czechia","Iran","New Zealand","Saudi Arabia","Curacao"],
  "Team 2 - Brown":  ["France","Germany","Norway","Japan","Turkey","Mexico","Scotland","Egypt","Australia","Uzbekistan","South Africa","Qatar"],
  "Team 3 - Hits":   ["Argentina","Portugal","Belgium","Croatia","Ivory Coast","USA","South Korea","Algeria","Bosnia","Tunisia","Iraq","Cape Verde"],
  "Team 4 - Taylor": ["England","Brazil","Colombia","Senegal","Switzerland","Sweden","Paraguay","Ghana","DR Congo","Panama","Jordan","Haiti"]
};

// NFL team colors
// Curtis = Miami Dolphins, Brown = NY Jets, Hits = Tennessee Titans, Taylor = Buffalo Bills
const COLORS = {
  "Team 1 - Curtis": { bg:"#008E97", accent:"#FC4C02", text:"#fff", grad:"#008E97", border:"#FC4C02", emoji:"🐬", nfl:"MIA" },
  "Team 2 - Brown":  { bg:"#125740", accent:"#ffffff", text:"#fff", grad:"#125740", border:"#ffffff", emoji:"✈️", nfl:"NYJ" },
  "Team 3 - Hits":   { bg:"#0C2340", accent:"#4DB8FF", text:"#fff", grad:"#0C2340", border:"#4DB8FF", emoji:"⚔️", nfl:"TEN" },
  "Team 4 - Taylor": { bg:"#00338D", accent:"#C60C30", text:"#fff", grad:"#00338D", border:"#C60C30", emoji:"🦬", nfl:"BUF" }
};

const FLAGS = {
  "Spain":"🇪🇸","Netherlands":"🇳🇱","Morocco":"🇲🇦","Ecuador":"🇪🇨","Uruguay":"🇺🇾","Austria":"🇦🇹",
  "Canada":"🇨🇦","Czechia":"🇨🇿","Czech Republic":"🇨🇿","Iran":"🇮🇷","New Zealand":"🇳🇿",
  "Saudi Arabia":"🇸🇦","Curacao":"🇨🇼","Curaçao":"🇨🇼","France":"🇫🇷","Germany":"🇩🇪",
  "Norway":"🇳🇴","Japan":"🇯🇵","Turkey":"🇹🇷","Türkiye":"🇹🇷","Mexico":"🇲🇽","Scotland":"🏴󠁧󠁢󠁳󠁣󠁴󠁿",
  "Egypt":"🇪🇬","Australia":"🇦🇺","Uzbekistan":"🇺🇿","South Africa":"🇿🇦","Qatar":"🇶🇦",
  "Argentina":"🇦🇷","Portugal":"🇵🇹","Belgium":"🇧🇪","Croatia":"🇭🇷",
  "Ivory Coast":"🇨🇮","Côte d'Ivoire":"🇨🇮","USA":"🇺🇸","United States":"🇺🇸",
  "South Korea":"🇰🇷","Korea Republic":"🇰🇷","Algeria":"🇩🇿",
  "Bosnia":"🇧🇦","Bosnia and Herzegovina":"🇧🇦","Tunisia":"🇹🇳","Iraq":"🇮🇶",
  "Cape Verde":"🇨🇻","Cabo Verde":"🇨🇻","England":"🏴󠁧󠁢󠁥󠁮󠁧󠁿","Brazil":"🇧🇷",
  "Colombia":"🇨🇴","Senegal":"🇸🇳","Switzerland":"🇨🇭","Sweden":"🇸🇪",
  "Paraguay":"🇵🇾","Ghana":"🇬🇭","DR Congo":"🇨🇩","Congo DR":"🇨🇩",
  "Panama":"🇵🇦","Jordan":"🇯🇴","Haiti":"🇭🇹"
};

const WC_GROUPS = {
  A:["Mexico","South Africa","South Korea","Czechia"],
  B:["Canada","Bosnia","Qatar","Switzerland"],
  C:["Brazil","Morocco","Haiti","Scotland"],
  D:["USA","Paraguay","Australia","Turkey"],
  E:["Germany","Ecuador","Ivory Coast","Curacao"],
  F:["Netherlands","Japan","Sweden","Tunisia"],
  G:["Belgium","Egypt","Iran","New Zealand"],
  H:["Spain","Uruguay","Cape Verde","Saudi Arabia"],
  I:["France","Senegal","Norway","Iraq"],
  J:["Argentina","Algeria","Austria","Jordan"],
  K:["Colombia","Portugal","DR Congo","Uzbekistan"],
  L:["England","Croatia","Ghana","Panama"]
};

const ALIASES = {
  "czech republic":"Czechia","côte d'ivoire":"Ivory Coast","cote d'ivoire":"Ivory Coast",
  "united states":"USA","korea republic":"South Korea","türkiye":"Turkey","turkiye":"Turkey",
  "curaçao":"Curacao","cabo verde":"Cape Verde","dr congo":"DR Congo","congo dr":"DR Congo",
  "democratic republic of congo":"DR Congo","bosnia and herzegovina":"Bosnia",
  "bosnia & herzegovina":"Bosnia","bosnia and herzegowina":"Bosnia"
};

function norm(n) {
  if (!n) return '';
  const l = n.toLowerCase().trim();
  return ALIASES[l] || n.trim();
}
function getOwner(c) {
  const n = norm(c).toLowerCase();
  for (const [t,l] of Object.entries(DRAFT_TEAMS)) if (l.some(x=>norm(x).toLowerCase()===n)) return t;
  return null;
}
function getGroup(c) {
  const n = norm(c).toLowerCase();
  for (const [g,t] of Object.entries(WC_GROUPS)) if (t.some(x=>norm(x).toLowerCase()===n)) return g;
  return '?';
}
function flag(n) { return FLAGS[n]||FLAGS[norm(n)]||'🏳'; }
function statusIcon(s) { return s==='advanced'?'✅':s==='eliminated'?'❌':s==='bubble'?'🫧':'⏳'; }

let standingsData = [];
let autoRefreshTimer = null;

// ── PARSE CSV ─────────────────────────────────────────────────────────
function parseCSV(text) {
  return text.trim().split('\n').slice(1).map(line => {
    const c = line.split(',').map(x=>x.trim().replace(/^"|"$/g,''));
    return { date:c[0],group:c[1],team1:c[2],score1:c[3]!==''?+c[3]:null,score2:c[4]!==''?+c[4]:null,team2:c[5],played:c[6]==='YES' };
  }).filter(m=>m.team1&&m.team2);
}

// ── COMPUTE STANDINGS ─────────────────────────────────────────────────
function computeStandings(matches) {
  const table = {};
  Object.entries(WC_GROUPS).forEach(([grp,teams])=>teams.forEach(t=>{
    table[norm(t).toLowerCase()]={ team:norm(t),group:grp,played:0,won:0,drawn:0,lost:0,gf:0,ga:0,gd:0,pts:0,status:'active' };
  }));
  matches.forEach(m=>{
    if (!m.played||m.score1===null||m.score2===null) return;
    const k1=norm(m.team1).toLowerCase(), k2=norm(m.team2).toLowerCase();
    if (!table[k1]||!table[k2]) return;
    table[k1].played++; table[k1].gf+=m.score1; table[k1].ga+=m.score2; table[k1].gd=table[k1].gf-table[k1].ga;
    table[k2].played++; table[k2].gf+=m.score2; table[k2].ga+=m.score1; table[k2].gd=table[k2].gf-table[k2].ga;
    if (m.score1>m.score2){table[k1].won++;table[k1].pts+=3;table[k2].lost++;}
    else if(m.score1<m.score2){table[k2].won++;table[k2].pts+=3;table[k1].lost++;}
    else{table[k1].drawn++;table[k1].pts++;table[k2].drawn++;table[k2].pts++;}
  });
  const groups={};
  Object.values(table).forEach(t=>{ if(!groups[t.group])groups[t.group]=[];groups[t.group].push(t); });
  Object.values(groups).forEach(grp=>{
    const s=[...grp].sort((a,b)=>b.pts-a.pts||b.gd-a.gd||b.gf-a.gf);
    if(s.every(t=>t.played===3)){s[0].status='advanced';s[1].status='advanced';s[2].status='bubble';s[3].status='eliminated';}
    else{if(s[0].pts>=7)s[0].status='advanced';if(s[3]&&s[3].played===3&&s[3].pts===0)s[3].status='eliminated';}
  });
  return Object.values(table);
}

// ── LOAD DATA ─────────────────────────────────────────────────────────
async function loadData() {
  const btn=document.getElementById('refresh-btn');
  const statusEl=document.getElementById('status-text');
  const errorEl=document.getElementById('error-banner');
  const infoEl=document.getElementById('info-banner');
  btn.disabled=true; btn.innerHTML='<span class="spinner"></span>';
  statusEl.innerHTML='<span class="spinner"></span> Fetching…';
  errorEl.style.display='none'; infoEl.style.display='none';

  try {
    const res=await fetch(SHEET_CSV_URL+'&cachebust='+Date.now());
    if(!res.ok) throw new Error('HTTP '+res.status);
    const matches=parseCSV(await res.text());
    standingsData=computeStandings(matches);
    const played=matches.filter(m=>m.played).length;
    const now=new Date();
    statusEl.textContent=`Updated ${now.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})} · ${played} matches played`;
    document.querySelector('.hero-sub').textContent=`Curtis · Brown · Hits · Taylor · auto-refreshes every 5 min`;
    infoEl.textContent=`${played} of 72 group stage matches completed`;
    infoEl.style.display='block';
  } catch(e) {
    errorEl.textContent='⚠ Could not load data. Will retry in 5 minutes.';
    errorEl.style.display='block';
    statusEl.textContent='Load failed';
    seedBlankData();
  }
  renderAll();
  btn.disabled=false; btn.textContent='↻ Refresh';
}

function seedBlankData() {
  standingsData=Object.entries(WC_GROUPS).flatMap(([grp,teams])=>
    teams.map(t=>({team:norm(t),group:grp,played:0,won:0,drawn:0,lost:0,gf:0,ga:0,gd:0,pts:0,status:'active'}))
  );
}

// ── RENDER ────────────────────────────────────────────────────────────
function renderAll(){ renderLeaderboard(); renderTeams(); renderGroups(); }

function renderLeaderboard() {
  const lb=Object.keys(DRAFT_TEAMS).map(name=>{
    const mine=standingsData.filter(s=>DRAFT_TEAMS[name].some(c=>norm(c).toLowerCase()===norm(s.team).toLowerCase()));
    return { name, total:mine.reduce((a,b)=>a+(b.pts||0),0), advanced:mine.filter(s=>s.status==='advanced').length, alive:mine.filter(s=>s.status!=='eliminated').length };
  }).sort((a,b)=>b.total-a.total||b.advanced-a.advanced);

  const maxPts=Math.max(...lb.map(l=>l.total),1);
  const ranks=['1ST','2ND','3RD','4TH'];

  document.getElementById('lb-content').innerHTML=lb.map((item,i)=>{
    const c=COLORS[item.name];
    return `
    <div class="lb-card ${i===0?'first':''}">
      <div class="lb-row">
        <div style="display:flex;align-items:center;gap:12px">
          <div class="lb-rank" style="background:${c.bg};color:${c.accent};font-size:10px;letter-spacing:1px">${ranks[i]}</div>
          <div>
            <div class="lb-name">${c.emoji} ${item.name}</div>
            <div class="lb-sub">${item.alive} nations alive &nbsp;·&nbsp; ${item.advanced} advanced</div>
          </div>
        </div>
        <div style="text-align:right">
          <div class="lb-pts" style="color:${c.accent}">${item.total}</div>
          <div class="lb-pts-label">pts</div>
        </div>
      </div>
      <div class="progress-track">
        <div class="progress-fill" style="width:${Math.round(item.total/maxPts*100)}%;background:${c.accent}"></div>
      </div>
    </div>`;
  }).join('');
}

function renderTeams() {
  const lb=Object.keys(DRAFT_TEAMS).map(name=>({
    name, total:standingsData.filter(s=>DRAFT_TEAMS[name].some(c=>norm(c).toLowerCase()===norm(s.team).toLowerCase())).reduce((a,b)=>a+(b.pts||0),0)
  })).sort((a,b)=>b.total-a.total);

  document.getElementById('teams-content').innerHTML=lb.map(({name})=>{
    const c=COLORS[name];
    const mine=standingsData.filter(s=>DRAFT_TEAMS[name].some(c2=>norm(c2).toLowerCase()===norm(s.team).toLowerCase())).sort((a,b)=>b.pts-a.pts);
    const total=mine.reduce((a,b)=>a+(b.pts||0),0);
    const adv=mine.filter(s=>s.status==='advanced').length;
    const act=mine.filter(s=>s.status==='active'||s.status==='bubble').length;
    const eli=mine.filter(s=>s.status==='eliminated').length;
    return `
    <div class="team-card" style="border-color:${c.border}22">
      <div class="team-header" style="border-left:4px solid ${c.accent}">
        <div>
          <div class="team-header-label" style="color:${c.accent}">${c.nfl} · ${c.emoji}</div>
          <div class="team-header-name">${name}</div>
          <div class="team-header-sub">
            ${adv?`✅ ${adv} advanced &nbsp;`:''}${act?`⏳ ${act} playing &nbsp;`:''}${eli?`❌ ${eli} eliminated`:''}
          </div>
        </div>
        <div style="text-align:right">
          <div class="team-header-pts" style="color:${c.accent}">${total}</div>
          <div style="font-size:9px;letter-spacing:2px;text-transform:uppercase;opacity:.4">PTS</div>
        </div>
      </div>
      <div class="team-body">
        ${mine.map(s=>`
        <div class="country-row" style="border-left-color:${c.accent}">
          <span style="font-size:19px">${flag(s.team)}</span>
          <div style="flex:1">
            <div class="country-name">${s.team}</div>
            <div class="country-sub">GRP ${s.group} &nbsp;·&nbsp; ${s.played}GP &nbsp;·&nbsp; ${s.gd>0?'+':''}${s.gd} GD</div>
          </div>
          <div class="pts-badge" style="background:${c.bg};color:${c.accent}">${s.pts}</div>
          <span style="font-size:16px;margin-left:4px">${statusIcon(s.status)}</span>
        </div>`).join('')}
      </div>
    </div>`;
  }).join('');
}

function renderGroups() {
  document.getElementById('groups-content').innerHTML=Object.entries(WC_GROUPS).map(([grp,teams])=>`
    <div class="group-block">
      <div class="group-header">Group ${grp}</div>
      ${teams.map(team=>{
        const owner=getOwner(team), c=owner?COLORS[owner]:null;
        const s=standingsData.find(x=>norm(x.team).toLowerCase()===norm(team).toLowerCase());
        return `
        <div class="group-row" style="${c?'border-left:3px solid '+c.accent+';':''} background:${c?c.bg+'18':'transparent'}">
          <span style="font-size:19px">${flag(team)}</span>
          <span style="font-weight:700;font-size:13px">${team}</span>
          ${owner?`<span class="owner-tag" style="background:${c.bg};color:${c.accent}">${owner.split(' - ')[1]}</span>`:''}
          <div class="group-stats">
            ${s?`<span>${s.played}GP</span><span style="font-weight:800;color:${c?c.accent:'#fff'}">${s.pts}pts</span><span>${statusIcon(s.status)}</span>`:'<span style="opacity:.2">—</span>'}
          </div>
        </div>`;
      }).join('')}
    </div>`).join('');
}

// ── TABS ──────────────────────────────────────────────────────────────
function switchTab(name,btn) {
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('panel-'+name).classList.add('active');
  btn.classList.add('active');
}

// ── AUTO-REFRESH ──────────────────────────────────────────────────────
function startAutoRefresh() {
  if (autoRefreshTimer) clearInterval(autoRefreshTimer);
  autoRefreshTimer = setInterval(loadData, 5 * 60 * 1000);
}

// ── INIT ──────────────────────────────────────────────────────────────
seedBlankData();
renderGroups();
loadData();
startAutoRefresh();
</script>
</body>
</html>
